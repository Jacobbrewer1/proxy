name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: [ "main", "bug/*" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.20.1

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@79abd3f86f79a9d68a23c75a09a9a85889262adf
        
      - name: Docker login
        run: |
          export CR_PAT=${{ secrets.GH_ACCESS_TOKEN }}
          echo $CR_PAT | docker login ${{ env.REGISTRY }} --username ${GH_USERNAME}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          
      - name: Build binary
        run: |
          go mod tidy
          go build -o proxy ./cmd/proxy
        
      - name: Docker build
        run: docker build . -t ${{ env.REGISTRY }}/${GH_USERNAME}/${{ github.repository }}:latest
        
      - name: Docker push
        run: docker push ${{ env.REGISTRY }}/${GH_USERNAME}/${{ github.repository }}:latest
