# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: go-pr

on:
  pull_request:
    branches: [ "main" ]

jobs:
  golang-ci-lint:
    name: Golangci-lint
    runs-on: ubuntu-latest
    steps:
    # Sets up golang
    - uses: actions/setup-go@v4
      with:
        go-version: '1.20.3'

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: v1.52.2
        only-new-issues: true
        verbose: true
        
  code-approval:
    name: "Code Approval"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.20.1
        
    - name: Setup
      run: |
        go mod tidy
        cd ./cmd

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
